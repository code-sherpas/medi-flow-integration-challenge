<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E86C1"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8E44AD"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#FAFCFE" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B4F72">Architecture — MediFlow Prescription Processing</text>

  <!-- Client box -->
  <rect x="30" y="160" width="130" height="70" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="192" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F72">Client</text>
  <text x="95" y="212" text-anchor="middle" font-size="11" fill="#5D6D7E">(API Consumer)</text>

  <!-- Prescription Service (candidate builds this) -->
  <rect x="250" y="80" width="200" height="230" rx="10" fill="#FFFFFF" stroke="#E74C3C" stroke-width="2.5" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <rect x="250" y="80" width="200" height="36" rx="10" fill="#E74C3C"/>
  <rect x="250" y="100" width="200" height="16" fill="#E74C3C"/>
  <text x="350" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Prescription Service</text>
  <text x="350" y="123" text-anchor="middle" font-size="10" fill="#E74C3C" font-style="italic">⚑ YOU BUILD THIS</text>

  <text x="350" y="155" text-anchor="middle" font-size="11" fill="#2C3E50">POST /prescriptions</text>
  <text x="350" y="175" text-anchor="middle" font-size="11" fill="#2C3E50">GET  /prescriptions/:id</text>
  <text x="350" y="195" text-anchor="middle" font-size="11" fill="#2C3E50">GET  /prescriptions</text>
  <line x1="275" y1="215" x2="425" y2="215" stroke="#D5D8DC" stroke-width="1"/>
  <text x="350" y="235" text-anchor="middle" font-size="11" fill="#2C3E50">Webhook listener</text>
  <text x="350" y="255" text-anchor="middle" font-size="10" fill="#7F8C8D">(receives authorization</text>
  <text x="350" y="270" text-anchor="middle" font-size="10" fill="#7F8C8D">results)</text>

  <!-- Medication Catalog -->
  <rect x="560" y="80" width="170" height="80" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="645" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F72">Medication</text>
  <text x="645" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F72">Catalog</text>
  <text x="645" y="150" text-anchor="middle" font-size="10" fill="#5D6D7E">(Mock REST API)</text>

  <!-- Message Broker -->
  <rect x="560" y="210" width="170" height="60" rx="8" fill="#FEF9E7" stroke="#E67E22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="645" y="237" text-anchor="middle" font-size="13" font-weight="bold" fill="#7D6608">Message Broker</text>
  <text x="645" y="257" text-anchor="middle" font-size="10" fill="#5D6D7E">(In-Memory)</text>

  <!-- Insurance Authorization Mock -->
  <rect x="560" y="320" width="170" height="70" rx="8" fill="#F5EEF8" stroke="#8E44AD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="645" y="348" text-anchor="middle" font-size="13" font-weight="bold" fill="#6C3483">Insurance</text>
  <text x="645" y="366" text-anchor="middle" font-size="13" font-weight="bold" fill="#6C3483">Authorization</text>
  <text x="645" y="383" text-anchor="middle" font-size="10" fill="#5D6D7E">(Mock Consumer)</text>

  <!-- Arrows -->
  <!-- Client -> Prescription Service -->
  <line x1="160" y1="195" x2="245" y2="195" stroke="#2E86C1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="202" y="188" text-anchor="middle" font-size="9" fill="#2E86C1" font-weight="bold">REST</text>

  <!-- Prescription Service -> Catalog -->
  <line x1="450" y1="130" x2="555" y2="120" stroke="#2E86C1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="502" y="112" text-anchor="middle" font-size="9" fill="#2E86C1" font-weight="bold">REST</text>

  <!-- Prescription Service -> Broker (publish) -->
  <line x1="450" y1="240" x2="555" y2="240" stroke="#E67E22" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="502" y="233" text-anchor="middle" font-size="9" fill="#E67E22" font-weight="bold">publish</text>

  <!-- Broker -> Insurance Auth -->
  <line x1="645" y1="270" x2="645" y2="315" stroke="#E67E22" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="670" y="296" font-size="9" fill="#E67E22" font-weight="bold">deliver</text>

  <!-- Insurance Auth -> Broker (result) -->
  <line x1="730" y1="330" x2="790" y2="330" stroke="#8E44AD" stroke-width="1.5"/>
  <line x1="790" y1="330" x2="790" y2="250" stroke="#8E44AD" stroke-width="1.5"/>
  <line x1="790" y1="250" x2="735" y2="250" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="820" y="296" text-anchor="middle" font-size="9" fill="#8E44AD" font-weight="bold">result</text>

  <!-- Broker -> Prescription Service (callback) -->
  <line x1="560" y1="255" x2="453" y2="270" stroke="#E67E22" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="510" y="275" text-anchor="middle" font-size="9" fill="#E67E22" font-weight="bold">callback</text>

  <!-- Legend -->
  <rect x="30" y="360" width="400" height="50" rx="6" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>
  <line x1="50" y1="380" x2="85" y2="380" stroke="#2E86C1" stroke-width="2"/>
  <text x="90" y="384" font-size="10" fill="#2C3E50">Synchronous REST</text>
  <line x1="195" y1="380" x2="230" y2="380" stroke="#E67E22" stroke-width="2"/>
  <text x="235" y="384" font-size="10" fill="#2C3E50">Async messaging</text>
  <rect x="335" y="372" width="16" height="16" rx="3" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="357" y="384" font-size="10" fill="#2C3E50">Candidate builds</text>
</svg>
